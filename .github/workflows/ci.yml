name: CI

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  test:
    name: Lint, typecheck, build, test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.29.2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      # Build first: @yaku/cli, @yaku/api and @yaku/mcp resolve @yaku/core via
      # its emitted dist/*.d.ts, so the package must be built before the
      # dependent packages can typecheck in a clean checkout.
      - name: Build
        run: pnpm build

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test
